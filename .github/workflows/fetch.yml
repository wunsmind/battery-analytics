name: Fetch Tibber prices

on:
  schedule:
    # 13:00 UTC daily = 14:00 CET (winter) / 15:00 CEST (summer).
    # Safely after Nord Pool day-ahead publication (~12:45 CET) year-round.
    - cron: "0 13 * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

# Needed so the workflow can commit the updated db back to the repo.
permissions:
  contents: write

concurrency:
  group: fetch-prices
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Fetch prices into prices.db
        env:
          TIBBER_TOKEN: ${{ secrets.TIBBER_TOKEN }}
        run: python fetch.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prices.db
          if git diff --staged --quiet; then
            echo "No price changes to commit."
          else
            git commit -m "data: prices $(date -u +%Y-%m-%d)"
            git push
          fi
